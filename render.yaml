# ─────────────────────────────────────────────────────────────────────────────
# WhyteBox — Render.com Deployment Configuration
#
# Free tier deployment for educational use.
#
# IMPORTANT: This render.yaml lives in the repo root (whytebox-v2/).
# Render clones the repo so the working directory IS the repo root.
# rootDir paths are relative to the repo root — NOT to this file's location.
#
# Services deployed:
#   1. whytebox-backend  — FastAPI web service (free tier)
#   2. whytebox-db       — PostgreSQL database (free tier, 90-day limit)
#
# Frontend is deployed separately to Vercel (see vercel.json).
#
# Setup:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com/
#   3. Click "New" → "Blueprint" → connect your GitHub repo
#   4. Render will detect this render.yaml and create all services
#   5. Set the SECRET_KEY env var in the Render dashboard (marked sync: false)
#
# Docs: https://render.com/docs/blueprint-spec
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: whytebox-db
    databaseName: whytebox
    user: whytebox
    plan: free
    region: oregon
    # Free tier: 256MB RAM, 1GB storage, 90-day expiry
    # After 90 days, upgrade to starter ($7/mo) or export data

services:
  - type: web
    name: whytebox-backend
    plan: free
    region: oregon
    runtime: python
    # rootDir is relative to the repo root.
    # The repo IS whytebox-v2/ so backend/ is at the top level.
    rootDir: backend
    # Lock Python version to avoid unexpected upgrades breaking torch wheels
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers 1 --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 5 --access-logfile - --error-logfile - --log-level info
    # Root /health endpoint defined in main.py — always available, no DB dependency
    healthCheckPath: /health
    # Free tier: 512MB RAM, spins down after 15min inactivity
    # First request after spin-down takes ~30s (cold start)
    envVars:
      # Database — auto-populated from the whytebox-db service above
      - key: DATABASE_URL
        fromDatabase:
          name: whytebox-db
          property: connectionString
      # Security — REQUIRED: set this in the Render dashboard
      - key: SECRET_KEY
        sync: false  # Must be set manually in dashboard — never auto-generated
      # App settings
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      # CORS — set to your actual Vercel frontend URL
      # Update this after your first Vercel deployment
      # Multiple origins: comma-separated, no spaces
      # Note: wildcard subdomains (https://*.vercel.app) are NOT supported by FastAPI CORS
      - key: ALLOWED_ORIGINS
        value: "https://whytebox-v22.vercel.app"
      # ML settings
      - key: PYTORCH_DEVICE
        value: cpu
      - key: MODEL_CACHE_SIZE
        value: "3"
      - key: MODEL_CACHE_TTL
        value: "3600"
      - key: MAX_UPLOAD_SIZE
        value: "52428800"  # 50MB (reduced for free tier)
      # Redis — disabled on free tier (app handles missing Redis gracefully)
      # To enable: add Upstash Redis add-on and set REDIS_URL
      - key: REDIS_URL
        value: ""
      - key: CELERY_BROKER_URL
        value: ""
      - key: CELERY_RESULT_BACKEND
        value: ""
      # Upload directory
      - key: UPLOAD_DIR
        value: /tmp/uploads
      # Token expiry
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

