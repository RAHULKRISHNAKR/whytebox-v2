# WhyteBox virtual host
# Serves the React SPA on / and proxies /api/* + WebSocket /api/v1/ws/* to the backend.

# ── Upstream: FastAPI backend ─────────────────────────────────────────────────
upstream backend {
    server backend:8000;
    keepalive 32;
}

# ── Rate limiting zones ───────────────────────────────────────────────────────
# General API: 30 req/s per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
# Inference/explainability (heavy): 5 req/s per IP
limit_req_zone $binary_remote_addr zone=ml_limit:10m rate=5r/s;

# ── HTTP → HTTPS redirect (uncomment when TLS is configured) ─────────────────
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Nginx health check (used by Docker HEALTHCHECK) ───────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── WebSocket: streaming inference ───────────────────────────────────────
    # Must be matched before the general /api/ block.
    location /api/v1/ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for streaming connections
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── ML endpoints (rate-limited more aggressively) ─────────────────────────
    location ~ ^/api/v1/(inference|explainability)/ {
        limit_req zone=ml_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for ML inference (up to 3 min)
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_connect_timeout 10s;

        # Allow large uploads (images, models)
        client_max_body_size 512M;
    }

    # ── General API proxy ─────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Static assets: long cache ─────────────────────────────────────────────
    # Vite outputs hashed filenames (e.g. main.abc123.js) — safe to cache forever.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── SPA fallback: all other routes → index.html ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Error pages ───────────────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please slow down."}';
        add_header Content-Type application/json;
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        return 502 '{"error":"Service Unavailable","message":"Backend is temporarily unavailable."}';
        add_header Content-Type application/json;
    }
}

